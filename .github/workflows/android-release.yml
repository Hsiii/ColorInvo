name: Android Play release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name
        required: true
        default: 0.1.0
      version_code:
        description: Monotonically increasing version code
        required: true
        type: number
      track:
        description: Play track
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: google-play
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/android
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Prepare signing and Play credentials
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PROPERTIES: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > apps/android/colorinvo-upload.jks
          printf '%s' "$ANDROID_KEYSTORE_PROPERTIES" > apps/android/keystore.properties
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > apps/android/play-service-account.json
      - run: ./gradlew testDebugUnitTest lintDebug
        working-directory: apps/android
      - run: ./gradlew bundleRelease -PversionName="${{ inputs.version_name }}" -PversionCode="${{ inputs.version_code }}"
        working-directory: apps/android
      - run: bundle exec fastlane android upload
        working-directory: apps/android
        env:
          ANDROID_AAB_PATH: ${{ github.workspace }}/apps/android/app/build/outputs/bundle/release/app-release.aab
          PLAY_SERVICE_ACCOUNT_JSON: ${{ github.workspace }}/apps/android/play-service-account.json
          PLAY_TRACK: ${{ inputs.track }}
