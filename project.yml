name: ColorInvo
options:
  minimumXcodeGenVersion: 2.42.0
  postGenCommand: scripts/ios-patch-project-capabilities.sh
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "6.0"
targets:
  ColorInvo:
    type: application
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
    sources:
      - path: Sources/Shared
      - path: Sources/ColorInvoApp
    resources:
      - path: Resources/ColorInvo/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.colorinvo
        PRODUCT_NAME: ColorInvo
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: Sources/ColorInvoApp/Info.plist
      properties:
        CFBundleDisplayName: ColorInvo
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Sources/ColorInvoApp/ColorInvo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.hsichen.colorinvo
    dependencies:
      - target: ColorInvoWidget
        embed: true
  ColorInvoWidget:
    type: app-extension
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
    sources:
      - path: Sources/Shared
      - path: Sources/ColorInvoWidget
    settings:
      base:
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.colorinvo.widget
        PRODUCT_NAME: ColorInvoWidget
        SKIP_INSTALL: YES
    info:
      path: Sources/ColorInvoWidget/Info.plist
      properties:
        CFBundleDisplayName: ColorInvo
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/ColorInvoWidget/ColorInvoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.hsichen.colorinvo
