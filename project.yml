name: InvoiceCarrier
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "6.0"
targets:
  InvoiceCarrier:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/InvoiceCarrierApp
    resources:
      - path: Resources/InvoiceCarrier/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.invoicecarrier
        PRODUCT_NAME: 載具條碼
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: Sources/InvoiceCarrierApp/Info.plist
      properties:
        CFBundleDisplayName: 載具條碼
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Sources/InvoiceCarrierApp/InvoiceCarrier.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.hsichen.invoicecarrier
