name: ColorInvo
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: D925G8G7CS
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "6.0"
targets:
  ColorInvo:
    type: application
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
    sources:
      - path: Sources/Shared
      - path: Sources/ColorInvoApp
      - path: Resources/ColorInvo/Assets.xcassets
        buildPhase: resources
      - path: Resources/Shared/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 0.1.1
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.colorinvo
        PRODUCT_NAME: ColorInvo
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: Sources/ColorInvoApp/Info.plist
      properties:
        CFBundleDisplayName: ColorInvo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Sources/ColorInvoApp/ColorInvo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.hsichen.colorinvo
    dependencies:
      - target: ColorInvoWidget
        embed: true
  ColorInvoWidget:
    type: app-extension
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
    sources:
      - path: Sources/Shared
      - path: Sources/ColorInvoWidget
      - path: Resources/Shared/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 0.1.1
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.colorinvo.widget
        PRODUCT_NAME: ColorInvoWidget
        SKIP_INSTALL: YES
    info:
      path: Sources/ColorInvoWidget/Info.plist
      properties:
        CFBundleDisplayName: ColorInvo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/ColorInvoWidget/ColorInvoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.hsichen.colorinvo
  ColorInvoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Sources/ColorInvoUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.hsichen.colorinvo.uitests
        PRODUCT_NAME: ColorInvoUITests
        TEST_TARGET_NAME: ColorInvo
    dependencies:
      - target: ColorInvo
schemes:
  ColorInvo:
    build:
      targets:
        ColorInvo: all
        ColorInvoWidget: all
        ColorInvoUITests:
          - test
    test:
      targets:
        - name: ColorInvoUITests
  ColorInvoWidget:
    build:
      targets:
        ColorInvoWidget: all
